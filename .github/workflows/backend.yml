name: Backend CI

on:
  workflow_dispatch:
  push:
    paths:
      - "bugchetana_backend/**"
    branches:
      - main
      - system-in-backend
      - github-workflow
      - integration
      - machine-learning
      - psql-database

  pull_request:
    paths:
      - "bugchetana_backend/**"

defaults:
  run:
    working-directory: bugchetana_backend

jobs:
  ci:
    name: Type-check & Test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bugchetana
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: bugchetana_backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy pytest pytest-cov

      - name: Type check with mypy
        run: mypy . --ignore-missing-imports
        continue-on-error: true

      - name: Run tests with pytest
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: bugchetana
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          pytest --tb=short --cov=. --cov-report=term-missing

      - name: Success
        run: echo "backend ci passed successfully!"
